<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terumiu</title>
    <!--
      ルート `/` の言語振り分け。static export では middleware が無いので、ここで
      ブラウザ言語を見て `/ja-JP/` または `/en-US/` に飛ばす。下の script が
      同期実行で navigator.language を判定 → location.replace するため通常はこれが優先。
      JS 無効時のみ <noscript> の meta refresh で既定 (ja-JP) にフォールバックする
      (meta refresh を head 直下に無条件で置くと 0 秒指定でも JS と競合し、英語ブラウザを
       ja-JP に奪うことがあるため noscript で囲む)。
    -->
    <link rel="canonical" href="https://terumiu.com/ja-JP/" />
    <script>
      (function () {
        var supported = ['ja-JP', 'en-US'];
        var lang = (navigator.language || 'ja').toLowerCase();
        var target = lang.indexOf('ja') === 0 ? 'ja-JP' : 'en-US';
        if (supported.indexOf(target) === -1) target = 'ja-JP';
        location.replace('/' + target + '/');
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=/ja-JP/" />
    </noscript>
  </head>
  <body>
    <p style="font-family: sans-serif; padding: 2rem; color: #475569">
      Redirecting… <a href="/ja-JP/">日本語</a> / <a href="/en-US/">English</a>
    </p>
  </body>
</html>
